<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Login</title>

<style>
:root {
  --bg: #ffffff;
  --text: #000000;
  --primary: #111111;
  --accent: #444;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  background: rgb(17, 17, 17);
}

header {
  background: rgb(26, 26, 26);
  color: white;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1000;
  box-shadow: #00ff8831 0px 0px 10px;
}

nav {
  display: flex;
  align-items: center;
  gap: 20px;
}

nav a {
  color: white;
  text-decoration: none;
}

nav a:hover {
  text-decoration: underline;
}

.login-container {
  display: flex;
  justify-content: center;
  margin-top: 120px;
}

form {
  background: rgba(245, 245, 245, 0.842);
  backdrop-filter: blur(12px);
  padding: 30px;
  border-radius: 12px;
  border: 2px solid rgba(13, 105, 36, 0.884);
  width: 320px;
  
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  color: #000;
}

label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
  font-size: 14px;
}

input[type="text"],
input[type="password"] {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 2px solid #333;
  border-radius: 8px;
}

input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear {
  display: none;
}

input[type="password"]::-webkit-credentials-auto-fill-button,
input[type="password"]::-webkit-textfield-decoration-container {
  display: none !important;
}

input:focus {
  border-color: #00ff88;
  box-shadow: 0 0 5px #00ff88;
  outline: none;
}

input[type="submit"] {
  width: 100%;
  padding: 12px;
  background: #00ff88;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

input[type="submit"]:hover {
  background: #0c814a;
}

.senha-box {
  position: relative;
}

.toggle-senha {
  position: absolute;
  right: 12px;
  top: 38%;
  cursor: pointer;
}

.footer {
  background: #111;
  color: white;
  padding: 40px 20px;
  transition: all 1s ease;
}

.hidden {
  opacity: 0;
  transform: translateY(80px);
}

.show {
  opacity: 1;
  transform: translateY(0);
}
.footer {
  background-color: #111;
  color: #fff;
  padding: 40px 20px 20px;
  margin-top: 50px;
  box-shadow: #00ff8831 0px 0px 10px;
}

.footer-container {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 20px;
}

.footer-section {
  flex: 1;
  min-width: 200px;
}

.footer-section h3,
.footer-section h4 {
  margin-bottom: 10px;
}

.footer-section ul {
  list-style: none;
}

.footer-section ul li {
  margin-bottom: 8px;
}

.footer-section a {
  color: #bbb;
  text-decoration: none;
}

.footer-bottom {
  text-align: center;
  margin-top: 20px;
  border-top: 1px solid #333;
  padding-top: 10px;
  font-size: 14px;
  color: #aaa;
}

.text {
      font-family: 'Segoe UI', sans-serif;
      font-size: 26px;
      fill: #ffffff;
      letter-spacing: 1px;
    }
    .highlight {
      fill: #25D366;
      font-weight: bold;
    }

    .btn-login {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #00ff88;
  color: rgb(15, 15, 15);
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.btn-login:hover {
  background: #0c814a;
  transform: scale(1.02);

}


</style>
</head>

<body>

<header>
    <svg width="220" height="60" viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="18" stroke="#25D366" stroke-width="2" fill="none"/>
  <text x="60" y="36" class="text">
    Black<tspan class="highlight">Core</tspan>
  </text>
    </svg>

  <nav>
    <a href="inicial.html">Início</a>
    <a href="#">Produtos</a>
    <a href="#footer">Contato</a>
  </nav>
</header>

<div class="login-container">
  <form action="inicial.html" method="get">

    <h1>Login</h1>

    <label>Email</label>
    <input type="text" id="email" placeholder="Digite seu email" required>

    <label>Senha</label>
    <div class="senha-box">
      <input type="password" id="senha" placeholder="Digite sua senha" required>
      <i id="olho" class="fa-solid fa-eye toggle-senha" onclick="toggleSenha()"></i>
    </div>

    <label>
      <input type="checkbox" id="lembrar"> Lembrar de mim
    </label>
    
     <button type="button" class="btn-login"
        onclick="login()">
    Entrar
</button>

    <p style="text-align:center; margin-top:10px;">Não tem uma conta?</p>

    <button type="button" onclick="window.location.href='cadastro.html'"
      style="width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; background:#444; color:white; cursor:pointer;">
      Cadastre-se
    </button>

  </form>
</div>
<footer class="footer hidden" id="footer">
  <div class="footer-container">

    <div class="footer-section">
      <h3>BlackCore</h3>
      <p>Desenvolvido especialmente para atender as suas necessidades!</p>
    </div>

    <div class="footer-section">
      <h4>Links rápidos</h4>
      <ul>
        <li><a href="#">Início</a></li>
        <li><a href="#">Sobre</a></li>
        <li><a href="#">Serviços</a></li>
        <li><a href="#">Contato</a></li>
      </ul>
    </div>

    <div class="footer-section">
      <h4>Contato</h4>
      <p>Email: contato@gmail.com</p>
      <p>Telefone: (41) 047823-7773</p>
    </div>

  </div>

  <div class="footer-bottom">
    <p>&copy; 2026 BlackCore. Todos os direitos reservados.</p>
  </div>
</footer>

<script>

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {
    const res = await fetch("https://blackcore-5k72.onrender.com/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, senha })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.erro);
    }

    alert("Login feito!");
    console.log(data);

  } catch (err) {
    alert(err.message);
  }
}

function toggleSenha() {
  const senha = document.getElementById("senha");
  const olho = document.getElementById("olho");

  if (senha.type === "password") {
    senha.type = "text";
    olho.classList.replace("fa-eye", "fa-eye-slash");
  } else {
    senha.type = "password";
    olho.classList.replace("fa-eye-slash", "fa-eye");
  }
}

const footer = document.getElementById("footer");

const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (entry.isIntersecting) {
      footer.classList.add("show");
    }
  });
});

observer.observe(footer);

</script>

</body>
</html>
